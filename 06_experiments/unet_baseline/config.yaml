# U-Net Baseline Experiment Configuration
# =========================================

experiment:
  name: unet_baseline
  description: "U-Net baseline on standard segmentation benchmark"
  seed: 42

data:
  dataset: oxford_pet  # oxford_pet | drive | custom
  root_dir: ./data/
  image_size: [256, 256]
  num_classes: 2
  split:
    train: 0.8
    val: 0.1
    test: 0.1
  augmentation:
    train:
      horizontal_flip: true
      vertical_flip: false
      rotation_limit: 15
      brightness_limit: 0.2
      contrast_limit: 0.2
    val:
      # No augmentation for validation
  num_workers: 4
  pin_memory: true

model:
  architecture: unet
  encoder:
    name: custom  # custom | resnet34 | efficientnet-b0
    depth: 4
    base_filters: 64
  decoder:
    upsampling: bilinear  # bilinear | transposed_conv
    attention: false
  in_channels: 3
  num_classes: 2

training:
  epochs: 100
  batch_size: 8
  optimizer:
    name: adam
    lr: 1.0e-4
    weight_decay: 1.0e-5
  scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 5
    min_lr: 1.0e-7
  loss:
    name: bce_dice
    bce_weight: 0.5
    dice_weight: 0.5
  mixed_precision: true
  gradient_clip: 1.0
  early_stopping:
    patience: 15
    monitor: val_dice
    mode: max

logging:
  tensorboard: true
  log_dir: ./runs/
  log_interval: 10  # steps
  save_predictions: true
  save_interval: 5  # epochs

checkpointing:
  save_dir: ./checkpoints/
  save_best: true
  monitor: val_dice
  mode: max
